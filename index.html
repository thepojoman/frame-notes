<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frame Notes</title>
    <meta name="theme-color" content="#2d6a4f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Frame Notes" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="capture-panel" aria-labelledby="app-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Film exposure log</p>
            <h1 id="app-title">Frame Notes</h1>
          </div>
          <button class="icon-button" id="refreshConditions" type="button" title="Refresh location and weather" aria-label="Refresh location and weather">
            <span aria-hidden="true">↻</span>
          </button>
        </div>

        <div class="status-grid">
          <div>
            <span>Time</span>
            <strong id="timeNow">--:--</strong>
          </div>
          <div>
            <span>Place</span>
            <strong id="placeNow">Manual</strong>
          </div>
          <div>
            <span>Clouds</span>
            <strong id="cloudNow">Set below</strong>
          </div>
          <div>
            <span>Facing</span>
            <strong id="facingNow">North</strong>
          </div>
        </div>

        <form id="frameForm" class="form-grid">
          <label>
            Roll
            <input id="rollName" name="rollName" autocomplete="off" value="Roll 1" />
          </label>

          <label>
            Frame
            <input id="frameNumber" name="frameNumber" type="number" min="1" max="72" value="1" />
          </label>

          <fieldset>
            <legend>Film speed</legend>
            <div class="segmented" data-field="iso">
              <button type="button" data-value="100">100</button>
              <button type="button" data-value="200">200</button>
              <button type="button" data-value="400" class="active">400</button>
              <button type="button" data-value="800">800</button>
            </div>
          </fieldset>

          <fieldset>
            <legend>Film type</legend>
            <div class="segmented" data-field="filmType">
              <button type="button" data-value="Color" class="active">Color</button>
              <button type="button" data-value="Black and white">B&W</button>
            </div>
          </fieldset>

          <label>
            Direction facing
            <select id="direction" name="direction">
              <option>North</option>
              <option>Northeast</option>
              <option>East</option>
              <option>Southeast</option>
              <option>South</option>
              <option>Southwest</option>
              <option>West</option>
              <option>Northwest</option>
            </select>
          </label>

          <label>
            Cloud coverage
            <select id="cloudCover" name="cloudCover">
              <option value="0">Clear</option>
              <option value="25">Mostly clear</option>
              <option value="50">Partly cloudy</option>
              <option value="75">Mostly cloudy</option>
              <option value="100">Overcast</option>
            </select>
          </label>

          <label>
            Aperture used
            <select id="apertureUsed" name="apertureUsed">
              <option>Program</option>
              <option>f/1.4</option>
              <option>f/2</option>
              <option>f/2.8</option>
              <option>f/4</option>
              <option>f/5.6</option>
              <option>f/8</option>
              <option>f/11</option>
              <option>f/16</option>
              <option>f/22</option>
            </select>
          </label>

          <label>
            Shutter used
            <select id="shutterUsed" name="shutterUsed">
              <option>Program</option>
              <option>1</option>
              <option>1/2</option>
              <option>1/4</option>
              <option>1/8</option>
              <option>1/15</option>
              <option>1/30</option>
              <option>1/60</option>
              <option>1/125</option>
              <option>1/250</option>
              <option>1/500</option>
              <option>1/1000</option>
            </select>
          </label>

          <label class="wide">
            Notes
            <textarea id="notes" name="notes" rows="3" placeholder="Subject, lens, meter notes, bracketing, anything you want to compare later"></textarea>
          </label>

          <div class="actions wide">
            <button id="recommendButton" class="secondary" type="button">Recommend</button>
            <button class="primary" type="submit">Save frame</button>
          </div>
        </form>
      </section>

      <section class="recommendation-panel" aria-labelledby="recommendation-title">
        <div class="meter-visual" aria-hidden="true">
          <div class="sun-disc"></div>
          <div class="aperture-blades">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="recommendation-copy">
          <p class="eyebrow">Suggested starting point</p>
          <h2 id="recommendation-title"><span id="recommendedAperture">f/16</span> at <span id="recommendedShutter">1/500</span></h2>
          <p id="recommendationReason">Sunny 16 baseline for ISO 400, adjusted for your light and facing direction.</p>
        </div>

        <div class="quick-options" id="quickOptions" aria-label="Equivalent exposure options"></div>

        <div class="log-panel">
          <div class="section-head">
            <h2>Saved frames</h2>
            <button id="exportCsv" type="button" class="text-button">Export CSV</button>
          </div>
          <div id="emptyState" class="empty-state">No frames logged yet.</div>
          <div id="frameLog" class="frame-log"></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
